name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Unit tests (domain)
        run: cargo test -p domain
      - name: Application tests (fake ports + smoke)
        run: cargo test -p application
      - name: Adapter contract tests (mock HTTP)
        run: cargo test -p adapters

  integration:
    name: Integration (Postgres testcontainer)
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run repository integration tests
        run: cargo test -p repositories integration_find_alerts_in_postgres_container
      - name: Migration check
        run: |
          if [ -d migrations ]; then
            cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
            sqlx migrate info --source migrations
          else
            echo "No migrations directory found; migration check skipped."
          fi
      - name: Release build
        run: cargo build --release
